name: Fetch Matches Cruzeiro

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and push
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          TEAM_ID=1954

          LAST=$(curl -s --request GET \
            "https://sofascore.p.rapidapi.com/teams/get-last-matches?teamId=${TEAM_ID}&pageIndex=0" \
            --header "x-rapidapi-host: sofascore.p.rapidapi.com" \
            --header "x-rapidapi-key: ${RAPIDAPI_KEY}")

          NEXT=$(curl -s --request GET \
            "https://sofascore.p.rapidapi.com/teams/get-next-matches?teamId=${TEAM_ID}&pageIndex=0" \
            --header "x-rapidapi-host: sofascore.p.rapidapi.com" \
            --header "x-rapidapi-key: ${RAPIDAPI_KEY}")

          export LAST
          export NEXT

          DATA=$(node -e "
            const last = JSON.parse(process.env.LAST || '{\"events\":[]}');
            const next = JSON.parse(process.env.NEXT || '{\"events\":[]}');

            const adapt = (e) => ({
              idEvent: String(e.id),
              idHomeTeam: String(e.homeTeam?.id),
              idAwayTeam: String(e.awayTeam?.id),
              strHomeTeam: e.homeTeam?.shortName || e.homeTeam?.name,
              strAwayTeam: e.awayTeam?.shortName || e.awayTeam?.name,
              strLeague: e.tournament?.name || e.season?.tournament?.name || '',
              dateEvent: new Date(e.startTimestamp * 1000).toISOString().substring(0,10),
              strTime: new Date(e.startTimestamp * 1000).toISOString().substring(11,19),
              intHomeScore: e.homeScore?.current ?? null,
              intAwayScore: e.awayScore?.current ?? null,
            });

            const finished = (last.events || [])
              .sort((a, b) => b.startTimestamp - a.startTimestamp)
              .slice(0, 5)
              .map(adapt);

            const upcoming = (next.events || [])
              .sort((a, b) => a.startTimestamp - b.startTimestamp)
              .slice(0, 5)
              .map(adapt);

            console.log(JSON.stringify({finished, upcoming, updatedAt: new Date().toISOString()}));
          ")

          echo "Data: $DATA"

          curl -s -X PUT \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            "${FIREBASE_DB_URL}/bolao-cruzeiro-debates/matches.json?auth=${FIREBASE_SECRET}"

          echo "Done"
