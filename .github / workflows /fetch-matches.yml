name: Fetch Cruzeiro Matches

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch matches and write to Firebase
        env:
          FOOTBALL_KEY: ${{ secrets.BOLAO_FOOTBALL_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          CRUZEIRO_ID=1625
          BASE="https://api.football-data.org/v4/teams/${CRUZEIRO_ID}/matches"

          FINISHED=$(curl -s -H "X-Auth-Token: ${FOOTBALL_KEY}" "${BASE}?status=FINISHED&limit=5")
          SCHEDULED=$(curl -s -H "X-Auth-Token: ${FOOTBALL_KEY}" "${BASE}?status=SCHEDULED,TIMED&limit=5")

          PAYLOAD=$(node -e "
            const fin = JSON.parse(process.env.FIN || '{\"matches\":[]}');
            const sched = JSON.parse(process.env.SCHED || '{\"matches\":[]}');
            const out = {
              finished: (fin.matches || []).slice(-5).reverse(),
              upcoming: (sched.matches || []).slice(0, 5),
              updatedAt: new Date().toISOString()
            };
            console.log(JSON.stringify(out));
          " FIN="$FINISHED" SCHED="$SCHEDULED")

          curl -s -X PUT \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${FIREBASE_DB_URL}/bolao-cruzeiro-debates/matches.json?auth=${FIREBASE_SECRET}"

          echo "Done"
